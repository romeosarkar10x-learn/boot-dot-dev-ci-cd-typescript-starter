on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup gcloud
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: ${{ secrets.GCP_CREDENTIALS }}

            - name: Push it to Google Artifact Registry
              run: gcloud builds submit --tag asia-south1-docker.pkg.dev/romeosarkar10x-notely/notely-ar-repo/notely:latest .

            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 25

            - name: Install dependencies
              run: npm ci

            - name: Run database migrations
              run: npm run db:migrate
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}

            - name: Deploy to Cloud Run
              run: |
                  gcloud run deploy notely \
                  --image asia-south1-docker.pkg.dev/romeosarkar10x-notely/notely-ar-repo/notely:latest \
                  --region asia-south1 \
                  --allow-unauthenticated \
                  --project romeosarkar10x-notely \
                  --min-instances=1 \
                  --max-instances=4
